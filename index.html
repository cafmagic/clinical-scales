<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臨床評估工具箱 | 精神醫學部</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            width: 100%;
            padding: 2rem 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 1000px;
            width: 90%;
            margin: 2rem 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            border: 1px solid #e0e0e0;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            border-color: var(--accent-color);
        }

        .card h3 {
            margin: 0 0 10px 0;
            color: var(--primary-color);
            font-size: 1.4rem;
        }

        .card p {
            margin: 0;
            color: #7f8c8d;
            font-size: 0.95rem;
            flex-grow: 1;
        }

        .tag {
            display: inline-block;
            background: #e1f5fe;
            color: #0288d1;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-top: 15px;
            font-weight: bold;
            align-self: flex-start;
        }

        .card.placeholder {
            border: 2px dashed #bdc3c7;
            background: transparent;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #95a5a6;
        }

        .card.placeholder:hover {
            transform: none;
            box-shadow: none;
        }

        footer {
            margin-top: auto;
            padding: 2rem;
            color: #95a5a6;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>臨床評估工具箱</h1>
        <p>彰化基督教醫院 精神醫學部 專用</p>
    </header>

    <div class="container">
        
        <a href="PSQI_Calculator_Integrated.html" class="card">
            <h3>PSQI 睡眠品質量表</h3>
            <p>評估過去一個月的主觀睡眠品質、入睡時間、睡眠時數及效率。</p>
            <span class="tag">睡眠評估</span>
        </a>

        <div class="card placeholder">
            <h3>尚未開放</h3>
            <p>即將增加：兒青常用量表 (如 CSHQ, SNAP-IV)</p>
        </div>

        <div class="card placeholder">
            <h3>尚未開放</h3>
            <p>即將增加：情緒障礙評估工具</p>
        </div>

    </div>

    <footer>
        &copy; 2026 Clinical Evaluation Toolkit. 本工具僅供醫療專業人員參考使用。
    </footer>

</body>
</html>
